name: Claim bot

on:
  issue_comment:
    types: [created]

jobs:
  claim:
    uses: leanprover-community/claim-bot/.github/workflows/claim-commands.yml@v1
    with:
      project-title: "Tau Ceti"
      default-ttl: "30d"
      max-ttl: "90d"
      app-id: ${{ vars.CLAIM_BOT_APP_ID }}
    secrets:
      app-private-key: ${{ secrets.CLAIM_BOT_APP_PRIVATE_KEY }}
